name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend ──────────────────────────────────────────────
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/ScrapFlow.API/ScrapFlow.API.csproj

      - name: Build
        run: dotnet build src/ScrapFlow.API/ScrapFlow.API.csproj --no-restore --configuration Release

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scrapflow-client/package-lock.json

      - name: Install dependencies
        working-directory: scrapflow-client
        run: npm ci

      - name: Build
        working-directory: scrapflow-client
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:5010"
